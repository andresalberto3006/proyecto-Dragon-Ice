<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
        body{
            display: grid;
            grid-template-rows: 100vh 150px;
            grid-template-columns: 100%;
            grid-template-areas:
            "tres tres"
            "cua cua";
        }
        section h1{
            background-color: rgba(0, 154, 236, 0.571);
            height: 50px;
            border-radius: 10px;
            margin: 20px;
        }
        section p{
            background-color: rgba(81, 154, 200, 0.571);
            height: auto;
            border-radius: 10px;
            margin: 20px;
        }
        section{
           color:white;
            background:linear-gradient(rgb(3, 3, 52),rgb(4, 40, 87),rgba(8, 78, 190, 0.568));
            grid-area: tres;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        footer{
            background-color: rgba(0, 154, 236, 0.571);
            grid-area: cua;
        }
    </style>
</head>
<body>
    <section>
        <h1>HISTORIA</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas</p>
    </section>
    <footer>
        <p> 2023 Mi Sitio Web. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
