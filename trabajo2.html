<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{
    background:#020617;
    color:white;
    display:grid;
    grid-template-columns:18% 82%;
    grid-template-rows:100px auto 220px;
    grid-template-areas:
    "dos uno"
    "dos tres"
    "dos tres";
    min-height:100vh;
}
header{
    grid-area:uno;
    background:#0f172a;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:3px solid rgb(118,158,203);
    gap: 25;
}

header h2{
    color: white;
    background: #143363;
    width: 400px;
    height: 50px;
    display:flex;
    flex-direction: row-reverse;
    justify-content:center;
    align-items: center;
    border-radius: 15px;
}
header button{
    color: white;
    background: #143363;
    width: 200px;
    height: 50px;
    display:flex;
    flex-direction: column-reverse;
    justify-content:center;
    align-items: center;
    border-radius: 15px;
    border: none;
}
 button:hover{
    background: #2563eb;
    cursor: pointer;
     transform:scale(1.05);
}
header h4{
    color: white;
}
nav{
    grid-area: dos;
    background:linear-gradient(135deg, rgba(5,112,235,0.32), #2563eb) ;
}
.yo{
    grid-area: tres;
    background:#0f172a;
    padding:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}
.yyy article{
   grid-template-areas: repeat(4, 1fr) ;

}
.ttt article{
    grid-template-areas: repeat(3, 1fr);
    background: #143363;
    width: 250px;
    height: 350px;
    border-radius: 16px;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.rrr article{
    grid-template-areas: repeat(1, 1fr);
}
.yo button{
    color: white;
    background: #143363;
    width: 300px;
    height: 50px;
    display:flex;
    justify-content: center;
    align-items: center;
    border-radius: 15px;
    margin: 40px;
    border: none;
}
footer{
    grid-area:cua;
     background:#283f74;
     display:flex;
     justify-content:space-between;
     flex-wrap: wrap;
     align-items:center;
     border-top:3px solid rgb(118,158,203);
}
    </style>
</head>
<body>
    <header>
        <h2>PANEL DEL ADMINISTRADOR</h2>
        <h4><button>CERRAR SESION</button></h4>
    </header>
    <nav>
        <h2>Sistemas del Administrador</h2>
    </nav>
    <section class="yo">
        <article class="yyy"><button>Total de usuarios</button></article>
        <article class="yyy"><button>Total de productos</button></article>
        <article class="yyy"><button>Ventas del dia</button></article>
        <article class="yyy"><button>Ventas del dia</button></article>
        <article class="ttt"><h2>Resumen de Ventas</h2></article>
        <article class="ttt"><h2>Ventas por categoría</h2></article>
        <article class="ttt"><h2>Acciones rápidas</h2></article>
        <article class="rrr">
             <table>
            <tr> <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td></tr>
            <tr></tr>
            <tr></tr>
            <tr></tr>
            <tr></tr>
        </table>
        </article>
    </section>
</body>
</html>
