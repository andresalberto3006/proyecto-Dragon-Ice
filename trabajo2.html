<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    }
    body{
        background:#020617;
        color:white;
        padding: 20px;
    }
    header, nav, aside, article, section, footer{
        border: solid 3px white;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
    }
    header{
        background-color: rgb(27, 97, 129);
        height: 60px;
        display: flex;
        justify-content: space-between;
    }
    header h2{
        background-color: greenyellow;
        width: 80px;
        height: 30px;
        border-radius: 15px;
    }
       aside{
        flex: 1;
        background-color: aqua;
        height:850px ;
        flex-direction: column;
    }

    nav{
        display: flex;
        background-color: black;
        height: 40px;
    }
    main{
        display: flex;
        padding: 10px;
    }
    article{
        flex: 2;
        background-color: blueviolet;
        height: 850px;
    }
    section{
        background-color: blue;
        width: 1500px;
        height: 670px;
        margin-top: 20px;
        display: flex;
        text-align: center;
        flex-direction: row;
        justify-content: space-between;
    }
    section h3{
        background: gray;
        border-radius: 15px;
        width: 450px;
    }    
    footer{
        background-color: beige;
    }
body{
    background:#020617;
    color:white;
    display:grid;
    grid-template-columns:18% 82%;
    grid-template-rows:100px auto 220px;
    grid-template-areas:
    "dos uno"
    "dos tres"
    "dos tres";
    min-height:100vh;
}
header{
    grid-area:uno;
    background:#0f172a;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:3px solid rgb(118,158,203);
    gap: 25;
}

header h2{
    color: white;
    background: #143363;
    width: 400px;
    height: 50px;
    display:flex;
    flex-direction: row-reverse;
    justify-content:center;
    align-items: center;
    border-radius: 15px;
    margin: 30px;
}
header button{
    color: white;
    background: #143363;
    width: 200px;
    height: 50px;
    display:flex;
    flex-direction: column-reverse;
    justify-content:center;
    align-items: center;
    border-radius: 15px;
    border: none;
    margin: 30px;
}
 button:hover{
    background: #2563eb;
    cursor: pointer;
     transform:scale(1.05);
}
header h4{
    color: white;
}
nav{
    grid-area: dos;
    background:linear-gradient(135deg, rgba(5,112,235,0.32), #2563eb) ;
}
.yo{
    grid-area: tres;
    background:#0f172a;
    padding:40px;
    display:grid;
}
.ttt:hover{
     cursor: pointer;
     transform:scale(1.05);
}
.yyy{
   grid-template-columns: repeat(4, 1fr) ;
}
.ttt{
    grid-template-columns: repeat(3, 1fr);
    background: #143363;
    width: 400px;
    height: 350px;
    border-radius: 16px;
    display: flex;
    justify-content: center;
    padding: 20px;

}

.rrr{
    grid-template-areas: repeat(1, 1fr);
}
.yo button{
    color: white;
    background: #143363;
    width: 300px;
    height: 50px;
    display:flex;
    justify-content: center;
    align-items: center;
    border-radius: 15px;
    margin: 40px;
    border: none;
}
    </style>
</head>
<body>
    <header>
        <h2>ddfsc</h2>
        <h2>fdsff</h2>
        <h2>fadf</h2>
    </header>
    <main>
        <aside>gd
    </aside>
        <article>dfg
             <nav>dsf</nav>
            <section>
                <h3>rgtewte</h3>
                <h3>dsfsd</h3>
                <h3>dfs</h3>
            </section>
            <footer>cxzc</footer>
        </article>
    </main>

    
</body>
</html>
