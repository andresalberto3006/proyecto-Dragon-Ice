<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{
    background:#020617;
    color:white;
    display:grid;
    grid-template-columns:18% 82%;
    grid-template-rows:100px auto 220px;
    grid-template-areas:
    "dos uno"
    "dos tres"
    "dos tres";
    min-height:100vh;
}
header{
    grid-area:uno;
    background:#0f172a;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:3px solid rgb(118,158,203);
    gap: 25;
}

header h2{
    color: white;
    background: #143363;
    width: 400px;
    height: 50px;
    display:flex;
    flex-direction: row-reverse;
    justify-content:center;
    align-items: center;
    border-radius: 15px;
    border: none;
    margin: 30px;
}

header button{
    color: white;
    background: #143363;
    width: 200px;
    height: 50px;
    display:flex;
    flex-direction: column-reverse;
    justify-content:center;
    align-items: center;
    border-radius: 15px;
    border: none;
    margin: 30px;
}
header button:hover{
    background:#2563eb;
    transform: scale(1.05);
}
aside{
    grid-area: dos;
    background: #7692cf;
}
.yo{
    grid-area: tres;
    background:#0f172a;
    padding:30px;
    gap: 1px;
    display: grid;
    grid-template-rows: repeat(1, 1r);
    grid-template-columns: repeat(4, 1fr);
}

.yyy article{
     color: white;
    background: #143363;
     width: 300px;
    height: 50px;
    border-radius: 15px;
    margin: 15px;
    border: none;
    transition: 1s;


}
.yyy:hover{
    transform: scale(1.05);
}
   .yo h2{
    display: grid;
    background: #143363;
    width: 300px;
    height: 400px;
    border-radius: 15px;
}

.rrr article{
    grid-template-columns: repeat(1, 1fr);
}
.yo button{
    color: white;
    background: #143363;
     width: 270px;
    height: 50px;
    border-radius: 15px;
    margin: 15px;
    border: none;
}

    </style>
</head>
<body>
    <header>
        <h2>PANEL DEL ADMINISTRADOR</h2>
        <h4><button>CERRAR SESION</button></h4>
    </aside>
        <h2>Sistemas del Administrador</h2>
    </aside>
    <section class="yo">
       
        <article class="yyy">
        <button>Verntas del dia</button>
        <button>Total de usuarios</button></article>
        <button>Total de productos</button>
        <button>Ventas del dia</button>
    </article>
        <article class="ttt">
            <h2>Resumen de Ventas</h2></article>
        <h2>Ventas por categoría</h2></article>
        <h2>Acciones rápidas</h2>
        </article>
        <article class="rrr">
             <table>
            <tr> <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td></tr>
            <tr></tr>
            <tr></tr>
            <tr></tr>
            <tr></tr>
        </table>
        </article>
    </section>
</body>
</html>
