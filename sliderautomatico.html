<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background-color: #0c79ac8c;
    }


    /* .titulo {
        text-align: center;

    }*/

    .carrusel {
        width: 1280px;
        height: auto;
        margin: 50px auto 0;
        overflow: hidden;
    }

    .carrusel ul {
        display: flex;
        padding: 0;
        width: 400%;
        animation: slide 20s infinite alternate ease-in-out;
    }

    .carrusel li {
        width: 100%;
        position: relative;

    }

    @media(max-width:700px) {
        body {
            padding: 30px;
        }

        .slider-box {
            width: 100%;
        }

    }

    @keyframes slide {
        0% {
            margin-left: 0;
        }

        20% {
            margin-left: 0;
        }

        25% {
            margin-left: -100%;
        }

        45% {
            margin-left: -100%;
        }

        50% {
            margin-left: -200%;
        }

        70% {
            margin-left: -200%;
        }

        75% {
            margin-left: -300%;
        }

        100% {
            margin-left: -300%;
        }
    }
</style>

<body>

                </li>
            </ul>

        </section>

</html>
