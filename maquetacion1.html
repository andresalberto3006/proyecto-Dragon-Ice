<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Ice</title>
</head>
<style>
    body {
        font-family: sans-serif;
        margin: 0;
    }

    a {
        text-decoration: none;
        color: black;
    }

    header {
        background-color: #0c79ac8c;
        min-height: 70px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px;
    }

    .logo {
        display: flex;
        margin-left: 90px;
        align-items: center;
    }

    .logo img {
        position: absolute;
        margin-right: 10px;
        top: 10px;
        left: 10px;
        width: 80px;
        height: 80px;
        border-radius: 70%;
        border: 3px solid black;
    }

    nav a {
        font-weight: 600;
        padding-right: 10px;
    }

    nav a:hover {
        color: white;
    }

    aside {
        width: 100px;
        height: 100px;
        display: flex;
        animation: carrusel 18s infinite;
    }

    aside img {
        width: 100px;
        height: 100px;
        object-fit: cover;
        flex-shrink: 0;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background-color: 0c79ac8c;
    }


    /* .titulo {
        text-align: center;
        font-size: 40px;
        padding-top: 50px;
    }*/

    .carrusel {
        width: 1280px;
        height: auto;
        margin: 50px auto 0;
        overflow: hidden;
    }

    .carrusel ul {
        display: flex;
        padding: 0;
        width: 400%;
        animation: slide 20s infinite alternate ease-in-out;
    }

    .carrusel li {
        width: 100%;
        position: relative;

    }

    @media(max-width:700px) {
        body {
            padding: 30px;
        }

        .slider-box {
            width: 100%;
        }

    }

    @keyframes slide {
        0% {
            margin-left: 0;
        }

        20% {
            margin-left: 0;
        }

        25% {
            margin-left: -100%;
        }

        45% {
            margin-left: -100%;
        }

        50% {
            margin-left: -200%;
        }

        70% {
            margin-left: -200%;
        }

        75% {
            margin-left: -300%;
        }

        100% {
            margin-left: -300%;
        }
    }
</style>

<body>
    <header>
        <a href="" class="logo">
            <img src="xd.png" class="logo-img" alt="">
            <h2 class="logo-nombre">DRAGON ICE</h2>
        </a>
        <nav>
            <a href="" class="nav-link">Inicio</a>
            <a href="" class="nav-link">Sobre nosotros</a>
            <a href="" class="nav-link">Contacto</a>
        </nav>
        <section class="carrusel">

            <ul>
                <li>
                    <img src="brooke-lark-8beTH4VkhLI-unsplash.jpg" alt="">
                </li>
                <li>
                    <img src="homemade-popsicle-ice-cream-cones.jpg" alt="">
                </li>
                <li>
                    <img src="helados-caseros-kHnD-U701168147896s1D-1200x840@diario_abc.webp" alt="">
                </li>
                <li> <img src="still-life-cookies-ice-cream (1).jpg" alt="">
                </li>
            </ul>

        </section>
    </header>

</body>

</html>
