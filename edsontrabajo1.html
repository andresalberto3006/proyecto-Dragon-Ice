<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Ice</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{
    background:#020617;
    color:white;
    display:grid;
    grid-template-columns:18% 82%;
    grid-template-rows:100px auto 220px;
    grid-template-areas:
    "dos uno"
    "dos tres"
    "cua cua";
    min-height:100vh;
}


header{
    grid-area:uno;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    border-bottom:3px solid rgb(118,158,203);
}


header input{
    width:80%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:#1e293b;
    color:white;
    font-size:18px;
}


nav{
    grid-area:dos;
    background:linear-gradient(135deg, rgba(5,112,235,0.32), #2563eb);
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
    border-right:3px solid rgb(118,158,203);
}


nav img{
    width:100px;
    height:100px;
    border-radius:50%;
    border:4px solid rgb(118,158,203);
}


nav h2{
    margin-bottom:20px;
}


nav a{
    width:100%;
    text-decoration:none;
    color:white;
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    text-align:center;
    transition:0.3s;
}


nav a:hover{
    background:rgb(7,53,106);
    transform:scale(1.05);
}


section{
    grid-area:tres;
    padding:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}


article{
    background:#0f172a;
    padding:25px;
    border-radius:20px;
    transition:0.3s;
}


article:hover{
    border:2px solid rgb(118,158,203);
    transform:translateY(-8px);
}


article h1,
article h3{
    margin-bottom:15px;
    color:rgb(118,158,203);
}


#principal{
    width:100%;
    height:300px;
    border-radius:12px;
    object-fit:cover;
}


.catalogo{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}


.catalogo img{
    width:100%;
    height:120px;
    border-radius:10px;
    object-fit:cover;
}


form{
    display:flex;
    flex-direction:column;
    gap:15px;
}


label{
    color:rgb(118,158,203);
}


input{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
}


button{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}


button:hover{
    background:rgb(7,53,106);
}


footer{
    grid-area:cua;
    background:#0f172a;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    padding:30px;
    border-top:3px solid rgb(118,158,203);
}


footer h2{
    color:rgb(118,158,203);
    margin-bottom:10px;
}


iframe{
    width:500px;
    height:180px;
    border-radius:15px;
}


@media(max-width:900px){


    body{
        grid-template-columns:100%;
        grid-template-rows:auto auto auto auto;
        grid-template-areas:
        "uno"
        "dos"
        "tres"
        "cua"
    }


    nav{
        flex-direction:row;
        flex-wrap:wrap;
        justify-content:center;
    }


    nav a{
        width:auto;
    }


    iframe{
        width:100%;
    }


    footer{
        flex-direction:column;
        gap:20px;
    }
}


</style>
</head>
