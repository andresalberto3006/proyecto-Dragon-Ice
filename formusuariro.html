<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Usuario</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #d9efff, #eef7ff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .formulario{
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.12);
        }

        .formulario h2{
            text-align: center;
            color: #3498db;
            margin-bottom: 10px;
            font-size: 30px;
        }

        .subtitulo{
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .grupo{
            margin-bottom: 18px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }

        input{
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cfd9e2;
            border-radius: 12px;
            font-size: 15px;
            background-color: #f8fbff;
            transition: all 0.3s ease;
        }

        input:focus{
            border-color: #5dade2;
            background-color: #ffffff;
            box-shadow: 0px 0px 8px rgba(93, 173, 226, 0.4);
            outline: none;
        }

        .boton{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #5dade2, #3498db);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .boton:hover{
            background: linear-gradient(135deg, #3498db, #2e86c1);
            transform: translateY(-2px);
            box-shadow: 0px 5px 12px rgba(52, 152, 219, 0.4);
        }

    </style>
</head>

<body>

    <div class="formulario">

        <h2>👤 Crear Cuenta</h2>
        <p class="subtitulo">
            Complete los datos del usuario
        </p>

        <form action="registro.php" method="POST">

            <div class="grupo">
                <label for="ciu">CI</label>
                <input type="text" id="ciu" name="ciu" placeholder="Ingrese su CI">
            </div>

            <div class="grupo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre">
            </div>

            <div class="grupo">
                <label for="direccion">Dirección</label>
                <input type="text" id="direccion" name="direccion" placeholder="Ingrese su dirección">
            </div>

            <div class="grupo">
                <label for="celular">Celular</label>
                <input type="text" id="celular" name="celular" placeholder="Ingrese su celular">
            </div>

            <div class="grupo">
                <label for="rol">Rol</label>
                <input type="text" id="rol" name="rol" placeholder="Ingrese su rol">
            </div>

            <div class="grupo">
                <label for="estado">Estado</label>
                <input type="text" id="estado" name="estado" placeholder="Ingrese su estado">
            </div>

            <button type="submit" class="boton">
                
            </button>

        </form>

    </div>

</body>
</html>
