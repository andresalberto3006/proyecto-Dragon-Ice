<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Heladería</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #cfe9ff, #e8f4ff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .formulario{
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.12);
        }

        .formulario h2{
            text-align: center;
            color: #3498db;
            margin-bottom: 25px;
            font-size: 30px;
        }

        .grupo{
            margin-bottom: 18px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }

        input{
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cfd9e2;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.3s;
            background-color: #f8fbff;
        }

        input:focus{
            border-color: #5dade2;
            box-shadow: 0px 0px 8px rgba(93, 173, 226, 0.4);
            outline: none;
            background-color: white;
        }

        .boton{
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #5dade2, #3498db);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .boton:hover{
            background: linear-gradient(135deg, #3498db, #2e86c1);
            transform: translateY(-2px);
            box-shadow: 0px 5px 12px rgba(52, 152, 219, 0.4);
        }

        .subtitulo{
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }

    </style>
</head>

<body>

    <div class="formulario">

        <h2>🍦 Registrar Producto</h2>
        <p class="subtitulo">
            Complete los datos del producto de la heladería
        </p>

        <form action="registro.php" method="POST">

            <div class="grupo">
                <label for="ci">Código / CI</label>
                <input type="text" id="ci" name="ci" placeholder="Ingrese el código">
            </div>

            <div class="grupo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese el nombre">
            </div>

            <div class="grupo">
                <label for="descripcion">Descripción</label>
                <input type="text" id="descripcion" name="descripcion" placeholder="Descripción del producto">
            </div>

            <div class="grupo">
                <label for="precio">Precio</label>
                <input type="text" id="precio" name="precio" placeholder="Ingrese el precio">
            </div>

            <div class="grupo">
                <label for="costo">Costo</label>
                <input type="text" id="costo" name="costo" placeholder="Ingrese el costo">
            </div>

            <div class="grupo">
                <label for="stock">Stock</label>
                <input type="text" id="stock" name="stock" placeholder="Cantidad disponible">
            </div>

            <button type="submit" class="boton">
                Guardar Producto
            </button>

        </form>

    </div>

</body>
</html>
