<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        header{
        background-color: aqua;
        grid-area: uno;
    }
        
        main{
            background-color: brown;
            grid-area: tres;
        }
        footer{
            background-color: yellow;
            grid-area: cua;
        }
        body{
            display: grid;
            grid-template-rows: 200px 900px 200px;
            grid-template-columns: 100%;
            grid-template-areas: 
            "uno "
            "tres"
            "cua";
            gap: 5px;
              overflow-x: hidden;
        }
        @media(max-width:700px){
            footer{
                background-color: red;
            }
        }
        body {
        font-family: sans-serif;
        margin: 0;
    }

    a {
        text-decoration: none;
        color: black;
    }

    header {
        background-color: #0c79ac8c;
        min-height: 70px;
        display: flex;
        justify-content:space-between;
        align-items: center;
        padding: 18px;
    }

    .logo {
        display: flex;
        margin-left: 90px;
        align-items: center;
    }

    .logo img {
        position: absolute;
        margin-right: 10px;
        top: 10px;
        left: 10px;
        width: 80px;
        height: 80px;
        border-radius: 70%;
        border: 3px solid black;
    }

    nav a {
        font-weight: 600;
        padding-right: 10px;
    }

    nav a:hover {
        color: white;
    }

    aside {
        width: 100px;
        height: 100px;
        display: flex;
        animation: carrusel 18s infinite;
    }

    aside img {
        width: 100px;
        height: 100px;
        object-fit: cover;
        flex-shrink: 0;
    }
    
    @media(max-width:700px) {
        header {
            flex-direction: column;
        }

        nav {
            padding: 10px 0px;
            padding-left: 150px;
        }
    }
    /*/////////carrucel/////////////
     body {
            overflow-x: hidden;
            font-family: Arial;
        }

        header {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* CARRUSEL */
        main {
            width: 100vw;
            height: 100vh;
            display: flex;
            animation: carrusel 18s infinite;
          
        }

        /* IMAGENES */
        main img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            flex-shrink: 0;
        }
          footer{
            background-color: #83ccf7;
            height: 300px;
            grid-area: cua;
        }
        .map iframe{
            height: 200px;
            position: absolute;
            right: 1px;
            border: 0;
            bottom: -460px;

        }

       

        /* ANIMACION */
        @keyframes carrusel {

            0%,
            30% {
                transform: translateX(0);
            }

            33%,
            63% {
                transform: translateX(-100vw);
            }

            66%,
            96% {
                transform: translateX(-200vw);
            }

            100% {
                transform: translateX(0);
            }

        }

    </style>
</head>
<body>
    <header>
         <a href="" class="logo">
            <img src="xd.png" class="logo-img" alt="">
            <h2 class="logo-nombre">DRAGON ICE</h2>
        </a>
        <nav>
            <a href="" class="nav-link">Inicio</a>
            <a href="" class="nav-link">Sobre nosotros</a>
            <a href="" class="nav-link">Contacto</a>
        </nav>
         
    </header>
    
    
        <main>
            <img src="a.jpg" alt="">
            <img src="b.avif" alt="">
            <img src="images (1).jpg" alt="">
        </main>
         <footer class="map">
         <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d615.3590111624675!2d-66.15389959642064!3d-17.39173143466908!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1ses!2sbo!4v1777933507710!5m2!1ses!2sbo&quot; width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </footer>

    
</body>
</html>
