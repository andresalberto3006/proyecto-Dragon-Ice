<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        header {
            background-color: #0039B0;
            grid-area: uno;
            min-height: 30px;
            display: flex;
            height: 130px;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }

        /*main{
            background-color: brown;
            grid-area: tres;
        }*/
        body {
            display: grid;
            grid-template-rows: 200px 900px 200px;
            grid-template-columns: 100%;
            grid-template-areas:
                "uno "
                "tres"
                "cua";
            gap: 0px;
            overflow-x: hidden;
        }

        footer {
            background-color: #83ccf7;
            height: 310px;
            grid-area: cua;
        }

        .map iframe {
            height: 210px;
            position: absolute;
            right: 1px;
            border: 0;
            top: 1165px;


        }

        @media(max-width:700px) {
            footer {
                background-color: red;
            }
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .logo {
            display: flex;
            margin-left: 90px;
            align-items: center;
        }

        .logo img {
            position: absolute;
            margin-right: 10px;
            top: 20px;
            left: 10px;
            width: 80px;
            height: 80px;
            border-radius: 70%;
            border: 3px solid black;
        }

        nav a {
            font-weight: 600;
            padding-right: 10px;
        }

        nav a:hover {
            color: white;
        }

        /*   aside {
            width: 100px;
            height: 100px;
            display: flex;
            animation: carrusel 18s infinite;
        }

        aside img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            flex-shrink: 0;
        }*/

        @media(max-width:700px) {
            header {
                flex-direction: column;
            }

            nav {
                padding: 10px 0px;
                padding-left: 150px;
            }
        }

        /*/////////carrucel/////////////
     body {
            overflow-x: hidden;
            font-family: Arial;
        }

        header {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* CARRUSEL */
        main {
            grid-area: tres;
            width: 100vw;
            height: 130vh;
            display: flex;
            animation: carrusel 18s infinite;

        }

        /* IMAGENES */
        main img {
            width: 100vw;
            height: 1670xp;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* ANIMACION */
        @keyframes carrusel {

            0%,
            30% {
                transform: translateX(0);
            }

            33%,
            63% {
                transform: translateX(-100vw);
            }

            66%,
            96% {
                transform: translateX(-200vw);
            }

            100% {
                transform: translateX(0);
            }

        }
    </style>
</head>

<body>
    <header>
        <a href="" class="logo">
            <img src="xd.png" class="logo-img" alt="">
            <h2 class="logo-nombre">DRAGON ICE</h2>
        </a>
        <nav>
            <a href="" class="nav-link">Inicio</a>
            <a href="" class="nav-link">Sobre nosotros</a>
            <a href="" class="nav-link">Contacto</a>
            <a href="" class="nav-link">Iniciar sesion</a>
            <a href="" class="nav-link">Registrate</a>
        </nav>

    </header>


    <main>
        <img src="1 (1).png" alt="">
        <img src="1 (3).png"">
        <img src=" 1 (4).png" alt="">
    </main>

    </footer>

    </section>


</body>

</html>
