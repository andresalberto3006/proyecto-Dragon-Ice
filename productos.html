<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>

body{
    display: grid;
    grid-template-rows:200px 455px 455px 450px;
    grid-template-columns: 21% 21% 21%;
    grid-template-areas: 
    "uno uno uno"
    "dos tres cuatro"
    "cinco seis siete"
    "ocho ocho ocho";

    gap: 100px;
    background: #0039B0;
    justify-content: center;
}

div{
    background: rgb(139, 226, 238);
    border-radius: 10%;
    
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    
}

#uno{ 
    grid-area: uno; 
    font-size: 50px;
}
#dos{
     grid-area: dos; 
    }
#tres{ 
    grid-area: tres;
 }
#cuatro{
     grid-area: cuatro; 
    }
#cinco{
     grid-area: cinco; 
    }
#seis{
     grid-area: seis; 
    }
#siete{
     grid-area: siete; 
    }

#ocho{
    grid-area: ocho;
    font-size: 35px;
    width: 1850px;
        height: 440px;
        font-family: Arial, Helvetica, sans-serif;
}

img{
    width: 250px;
    height: 250px;
    transition: 0.3s;
    border-radius: 10%;
}

img:hover{
    transform: scale(1.05);
    box-shadow: 4px 10px 6px #0039B0;
    
}

p{
    font-size: 50px;
    font-family:Arial, Helvetica, sans-serif ;
}
h2{
    background-color: rgb(139, 226, 238);
    position: relative;
    right: 245px;
}
iframe{
   position: relative;
   bottom: 350px;
left: 1230px;

}
h1{
    font-family: Arial, Helvetica, sans-serif;
}
@media(max-width:700px){

body{
    grid-template-columns: 1fr;
    grid-template-rows: auto;
    grid-template-areas:
    "uno"
    "dos"
    "tres"
    "cuatro"
    "cinco"
    "seis"
    "siete"
    "ocho";

    gap: 30px;
    padding: 20px;
}

#uno{
    font-size: 25px;
    text-align: center;
    padding: 20px;
}

div{
    width: 100%;
}

img{
    width: 180px;
    height: 180px;
    border-radius: 10%;
}

p{
    font-size: 30px;
    text-align: center;
}

#ocho{
    width: 100%;
    height: auto;
    font-size: 22px;
    padding: 20px;
    box-sizing: border-box;
}

h2{
    right: 0;
    text-align: center;
}

iframe{
    position: static;
    width: 100%;
    height: 300px;
    margin-top: 20px;
}

}
</style>
</head>
