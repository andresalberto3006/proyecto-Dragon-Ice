<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        color:aliceblue;
        background-color: rgb(33, 93, 223);
        display: grid;
        grid-template-rows:  500px 1000px 200px;
        grid-template-columns: 50% 50%;
        grid-template-areas: 
        "uno uno"
        "dos tres"
        "cua cua";
        border-radius: 20px;

        
    }
    header{
        grid-area: uno;
        background-color: aqua;
        margin: 4px;
    }
    header h1{
        background-color: aquamarine;
        width: 300px;
        height: 300px;
        padding: 50px;
        margin: 40px;
    }
    nav{
        grid-area: dos;
        background-color: blueviolet;
        margin: 4px;
    }
    section{
        grid-area: tres;
        background-color: antiquewhite;
        margin: 4px;
    }
    section button{
        width: 300px;
        height: 30px;
        border: none;
        transition: 0,5s;
    }
    section button:hover{
        background-color: blue;
        transform: scale(1,2);
    }
    footer{
        grid-area: cua;
        background-color: brown;
        margin: 4px;
    }
    @media(max-width:700px){
        body{
            display: grid;
            grid-template-columns: auto;
            grid-template-rows: 600px 600px 500px 400px;
            grid-template-areas: 
            "uno"
            "dos"
            "tres"
            "cua";
        }
        header{
            width: auto;

        }
        nav{
            width: auto;
        }
        section{
            width: auto;
        }
        footer{
            width: auto;
        }
    }
</style>
<body>
    <header>
        <h1>ESPANTAVIEJOS</h1>
    </header>
    <nav>2</nav>
    <section>
        <button>toca</button>
    </section>
    <footer>4</footer>
</body>
</html>
