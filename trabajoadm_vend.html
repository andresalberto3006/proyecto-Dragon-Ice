<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dragon Ice</title>

    <style>
        /* RESET */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* VIDEO */

        section {

            position: relative;

            width: 100%;

            height: 100vh;

            overflow: hidden;
        }

        video {

            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            width: 100%;

            height: 100%;

            object-fit: cover;
        }

        /* HEADER */

        header {

            position: absolute;

            top: 0;
            left: 0;

            width: 100%;

            height: 15px;

            padding: 35px 40px;

            display: flex;

            justify-content: space-between;

            align-items: center;

            background: rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(8px);

            border-bottom: 2px solid white;

            /* SOMBRA BONITA */

            box-shadow:
                0 0 10px rgba(0, 0, 0, 0.3),
                0 0 25px rgba(0, 0, 0, 0.4),
                0 0 45px rgba(0, 0, 0, 0.5),
                0 0 70px rgba(0, 0, 0, 0.4);
        }

        /* LOGO */

        aside {

            display: flex;

            align-items: center;

            gap: 10px;
        }

        aside img {

            width: 42px;

            height: 42px;

            border-radius: 50%;

            object-fit: cover;
        }

        /* TITULO */

        aside h1 {

            color: black;

            font-size: 18px;

            font-weight: bold;

            text-shadow:
                0 0 5px rgba(255, 255, 255, 0.7),
                0 0 10px rgba(255, 255, 255, 0.6);
        }

        /* MENU */

        nav {

            display: flex;

            align-items: center;

            gap: 25px;
        }

        /* ENLACES */

        nav a,
        button {

            color: black;

            text-decoration: none;

            font-size: 15px;

            font-weight: bold;

            background: none;

            border: none;

            cursor: pointer;

            text-shadow:
                0 0 5px rgba(255, 255, 255, 0.7);
        }

        /* REGISTRARSE */

        article {

            position: relative;
        }

        /* MENU DESPLEGABLE */

        ul {

            position: absolute;

            top: 45px;

            left: 0;

            background: white;

            border-radius: 10px;

            min-width: 180px;

            overflow: hidden;

            display: none;

            box-shadow:
                0 0 10px rgba(0, 0, 0, 0.3),
                0 0 25px rgba(0, 0, 0, 0.2);
        }

        /* MOSTRAR MENU */

        article:hover ul {

            display: block;
        }

        /* OPCIONES */

        li {

            list-style: none;
        }

        li a {

            display: block;

            padding: 12px 15px;

            color: black;

            text-decoration: none;

            font-weight: bold;
        }

        /* EFECTO */

        li a:hover {

            background: rgba(0, 0, 0, 0.08);
        }

        /* RESPONSIVE */

        @media(max-width:700px) {

            header {

                height: auto;

                padding: 20px;

                flex-direction: column;

                gap: 15px;
            }

            nav {

                flex-wrap: wrap;

                justify-content: center;

                gap: 15px;
            }

        }
    </style>
</head>

<body>

    <section>

        <video autoplay muted loop playsinline>

            <source src="video.mp4" type="video/mp4">

        </video>

        <!-- HEADER -->

        <header>

            <!-- LOGO -->

            <aside>

                <img src="logo.png" alt="Logo">

                <h1>Dragon Ice</h1>

            </aside>

            <nav>
                <a href="">Inicio</a>

                <article>

                    <button> Registrarte </button>

                    <ul>

                        <li>
                            <a href="">Administrador</a>
                        </li>

                        <li>
                            <a href="">Vendedor</a>
                        </li>

                        <li>
                            <a href="">Cliente</a>
                        </li>

                    </ul>

                </article>

                <a href="">Iniciar Sesión</a>

            </nav>

        </header>

    </section>

</body>

</html>
