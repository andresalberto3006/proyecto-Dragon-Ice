<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario</title>

<script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>

<style>

body{
    font-family: Arial;
    background-image: url("music-musical-instrument-guitar-two-dark-background.png");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;

    height: 100vh;
    margin: 0;
}

.container{

    width: 330px;

    padding: 30px;

    border-radius: 15px;

    background-color: rgba(59, 88, 128, 0.9);

    border: 2px solid #6bb7ff;

    box-shadow: 0px 0px 15px rgba(0,0,0,0.4);
}

h1{
    text-align: center;
    color: #fff3d6;
    margin-bottom: 10px;
}

p{
    text-align: center;
    color: white;
    font-size: 14px;
    margin-bottom: 20px;
}

.form-group{
    margin-bottom: 15px;
}

label{
    color: #fff3d6;
    display: block;
    margin-bottom: 5px;
}

input{

    width: 100%;

    padding: 10px;

    border: none;
    border-radius: 8px;

    background-color: #f2f2f2;
}

input:focus{
    border: 2px solid #4da6ff;
    outline: none;
}

.buttons{
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

button{

    width: 48%;

    padding: 10px;

    border: none;
    border-radius: 8px;

    color: white;

    cursor: pointer;
}
.editar{
    background-color: #1b7fa7a1;
}

.editar:hover{
    background-color: #003cace1;
}

.enviar{
    background-color: #1e3852;
}

.enviar:hover{
    background-color: #005397;
}

.borrar{
    background-color: #6c8fa7;
}

.borrar:hover{
    background-color: #002049;
}

.error{
    color: #ffd6d6;
    font-size: 13px;
    margin-top: 5px;
}

</style>
</head>

<body>

<div class="container">

    <h1>Formulario</h1>

    <p>Complete todos los datos</p>

    <form id="miFormulario">

        <div class="form-group">
            <label>Producto</label>
            <input type="text" name="nombre del producto">
        </div>

        <div class="form-group">
            <label>Stock</label>
            <input type="text" name="stock">
        </div>

        <div class="buttons">
            <button type="reset" class="editar">
                Editar
            </button>

            <button type="reset" class="borrar">
                Borrar
            </button>

            <button type="submit" class="enviar">
                Enviar
            </button>

        </div>

    </form>
    <a href=""></a>

</div>

</body>

</html>
