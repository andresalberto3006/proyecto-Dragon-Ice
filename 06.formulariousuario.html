<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Heladeria</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #7ec7ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 950px;
            margin: 0;
        }

        .formulario{
            background-color: white;
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            color: #0984e3;
            margin-bottom: 20px;
        }

        label{
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
            color: #2d3436;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 10px;
            border: 1px solid #b2bec3;
            border-radius: 8px;
            outline: none;
        }

        input:focus{
            border-color: #96d2ff;
        }

        .boton{
            width: 100%;
            background-color: #7ec7ff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .boton:hover{
            background-color: #b6cdf7;
        }
    </style>
</head>

<body>

    <div class="formulario">
        <h2>Crear Cuenta</h2>

        <form action="createusuario.php" method="POST">

            <label for="ciu">CI</label>
            <input type="number" id="ciu" placeholder="Ingrese su CI">

            <label for="nombre">nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre">

            <label for="direccion">direccion</label>
            <input type="text" id="direccion" name="direccion"placeholder="Ingrese su dirección">

            <label for="celular">celular</label>
            <input type="number" id="celular" name="celular"placeholder="Ingrese su celular">

            <label for="rol">rol</label>
            <input type="text" id="rol"name="rol" placeholder="Ingrese su rol">

            <label for="estado">estado</label>
            <input type="text" id="estado" name="estado"placeholder="Ingrese su estado">

            <button type="submit" class="boton">
                Crear Cuenta
            </button>

        </form>
    </div>

</body>
</html>
